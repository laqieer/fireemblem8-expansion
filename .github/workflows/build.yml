name: Build CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential binutils-arm-none-eabi libpng-dev gcc-arm-none-eabi libnewlib-arm-none-eabi libmgba-dev && python -m pip install ttp numpy pillow

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build tools
      run: ./build_tools.sh

    # expansion-modern-boot-check (modern.mk) transitively builds and
    # verifies the full modern object/ELF/ROM chain (expansion-modern-all ->
    # expansion-modern-elf -> expansion-modern-rom) before running the
    # behavior-policy boot fingerprint; it is not merely a compile-only
    # gate. Per repository policy, CI still ends after this target-ROM
    # step -- no decomp compare, progress, report, symbol, or Pages stages
    # follow it.
    - name: Build and verify modern target ROMs
      run: |
        make expansion-modern-boot-check MODERN_CONFIG=debug MODERN_ABI=aapcs -j2
        make expansion-modern-boot-check MODERN_CONFIG=release MODERN_ABI=aapcs -j2
