name: Build CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential binutils-arm-none-eabi libpng-dev gcc-arm-none-eabi libnewlib-arm-none-eabi libmgba-dev && python -m pip install ttp numpy pillow

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install agbcc
      run: git clone https://github.com/pret/agbcc.git && cd agbcc/ && ./build.sh && ./install.sh .. && cd ..

    # Cache the mgfembp submodule's agbcc variant (010110-ThumbPatch); the FE6 SIO
    # payload sub-build installs it on a cache miss.
    - name: Cache mgfembp agbcc
      uses: actions/cache@v4
      with:
        path: mgfembp/tools/agbcc
        key: mgfembp-agbcc-${{ hashFiles('mgfembp/tools/install_agbcc.sh') }}

    - name: Build tools
      run: ./build_tools.sh

    # Compile-only modern GCC objects/ELF are not built or gated here (see
    # modern.mk / expansion-modern-* targets); only the legacy ROM build and
    # the modern debug/release boot-check gate run in CI. Per repository
    # policy, CI ends after the target ROM build -- no decomp compare,
    # progress, report, symbol, or Pages stages follow this step.
    - name: Build and verify target ROMs
      run: |
        make fireemblem8.gba -j2
        make expansion-modern-boot-check MODERN_CONFIG=debug MODERN_ABI=aapcs -j2
        make expansion-modern-boot-check MODERN_CONFIG=release MODERN_ABI=aapcs -j2
