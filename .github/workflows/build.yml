name: Build CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential binutils-arm-none-eabi libpng-dev gcc-arm-none-eabi libnewlib-arm-none-eabi libmgba-dev && python -m pip install ttp numpy pillow

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build tools
      run: ./build_tools.sh

    # The linker gate builds the full modern object/ELF/ROM chain, checks
    # deterministic memory budgets, rejects orphan/overflow/cross-overlay
    # errors, and verifies normal plus shifted boot/title behavior.
    # Per repository policy, CI ends after these target-ROM checks.
    - name: Build and verify modern target ROMs and linker
      run: |
        make expansion-modern-linker-check MODERN_CONFIG=debug MODERN_ABI=aapcs -j2
        make expansion-modern-linker-check MODERN_CONFIG=release MODERN_ABI=aapcs -j2
